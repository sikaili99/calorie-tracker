appId: com.antomanc.simplecalorietracker
---
# Verify register screen is accessible and has all fields
- launchApp:
    clearState: true
- tapOn:
    id: "welcome-get-started"
- tapOn:
    id: "auth-choice-create-account"
- assertVisible:
    id: "register-first-name"
- assertVisible:
    id: "register-last-name"
- assertVisible:
    id: "register-email"
- assertVisible:
    id: "register-password"
- assertVisible:
    id: "register-submit"
