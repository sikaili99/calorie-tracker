appId: com.antomanc.simplecalorietracker
---
# Verify goal wizard steps are navigable
- launchApp:
    clearState: true
- tapOn:
    id: "welcome-get-started"
- tapOn:
    id: "auth-choice-guest"
# Step 1: About You
- assertVisible:
    id: "goal-wizard-next"
- assertVisible:
    id: "goal-wizard-skip"
- tapOn:
    id: "goal-wizard-next"
# Step 2: Body Measurements
- assertVisible:
    id: "goal-wizard-next"
- tapOn:
    id: "goal-wizard-next"
# Step 3: Activity Level
- assertVisible:
    id: "goal-wizard-next"
- tapOn:
    id: "goal-wizard-next"
# Step 4: Goal — finish wizard
- assertVisible:
    id: "goal-wizard-next"
- tapOn:
    id: "goal-wizard-next"
# Wait for navigation to diary after finish
- waitForAnimationToEnd
- assertVisible:
    id: "tab-diary"
